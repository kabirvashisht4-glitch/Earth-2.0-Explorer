<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-container">
        <header class="ui-header">
            <h1 class="main-title">EARTH EXPLORER</h1>
            
            <div class="search-wrapper">
                <input type="text" id="planetSearch" class="main-search" placeholder="Search Planets">
            </div>

            <div class="filter-group">
                <select class="ui-select"><option>Size</option></select>
                <select class="ui-select"><option>Discovered</option></select>
                <select class="ui-select"><option>Transit</option></select>
            </div>
        </header>

        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Planet Name</th>
                        <th>Host Name</th>
                        <th>Disc. Year</th>
                        <th>Method</th>
                        <th>Mass (Jup)</th>
                        <th>Dist (pc)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align: center;">Loading Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
