<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth 2.0 Explorer | NASA Data</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>EARTH 2.0 EXPLORER</h1>
        <p>Searching for habitable worlds across the cosmos</p>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search by planet name (e.g. Kepler)...">
            <select id="sortSelect">
                <option value="default">Sort By: Default</option>
                <option value="distance">Proximity (Closest)</option>
                <option value="year">Discovery Year (Newest)</option>
            </select>
        </div>
    </header>

    <main>
        <div id="loading" class="status-msg">Scanning deep space...</div>
        <div id="error" class="status-msg hidden">Connection lost to NASA Archive. Please try again.</div>
        <div id="planet-container" class="grid-container">
            </div>
    </main>

    <footer>
        <p>Data provided by NASA Exoplanet Archive TAP Service</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
