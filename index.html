<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-container">
        <header class="ui-header">
            <h1 class="main-title">EARTH EXPLORER</h1>
            
            <div class="search-wrapper">
                <input type="text" id="planetSearch" class="main-search" placeholder="Search Planets">
            </div>

            <div class="filter-group">
                <select id="filterSize" class="ui-select">
                    <option value="all">All Sizes</option>
                    <option value="small">Small (Earth-like)</option>
                    <option value="large">Large (Jupiter-like)</option>
                </select>
                <select id="filterYear" class="ui-select">
                    <option value="all">All Years</option>
                    <option value="new">New (2020+)</option>
                    <option value="old">Old (Before 2020)</option>
                </select>
                <select id="filterMethod" class="ui-select">
                    <option value="all">All Methods</option>
                    <option value="Transit">Transit</option>
                    <option value="Radial Velocity">Radial Velocity</option>
                </select>
            </div>
        </header>
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Planet Name</th>
                        <th>Host Name</th>
                        <th>Disc. Year</th>
                        <th>Method</th>
                        <th>Mass (Jup)</th>
                        <th>Dist (pc)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align: center;">Loading Data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
